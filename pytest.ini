[tool:pytest]
# Pytest configuration for AI MVP testing framework
testpaths = tests/unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --verbose
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
    --durations=10

# Test markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests between components
    api: API endpoint tests
    db: Database-related tests
    slow: Tests that take more than 1 second
    external: Tests that require external services
    press: PRESS planner functionality tests
    sources: Academic source integration tests
    rubric: Appraisal rubric tests
    dedup: Deduplication algorithm tests

# Environment variables for testing
env =
    ENVIRONMENT = testing
    DATABASE_URL = sqlite:///test.db
    LLM_MOCK_MODE = true
    OPENAI_API_KEY = test-key
    LANGSMITH_API_KEY = test-key
    SERPAPI_API_KEY = test-key
    S2_API_KEY = test-key

# Async configuration
asyncio_mode = auto

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning:langchain.*
    ignore::PendingDeprecationWarning
    ignore::UserWarning:newspaper.*