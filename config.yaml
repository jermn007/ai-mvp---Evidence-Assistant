# Configuration for AI MVP Evidence Assistant

# Deduplication settings
deduplication:
  # Title similarity threshold (0-100) for fuzzy matching
  title_similarity_threshold: 96
  
  # DOI/ID exact matching (always enabled)
  use_exact_matching: true
  
  # Additional deduplication strategies
  strategies:
    # Check abstract similarity for records without DOI
    abstract_similarity: 
      enabled: false
      threshold: 85
    
    # Check author similarity
    author_similarity:
      enabled: false  
      threshold: 90

# Metadata fields configuration
metadata:
  # Core fields (always included)
  core_fields:
    - record_id
    - title
    - abstract
    - authors
    - year
    - doi
    - url
    - source
    - publication_type
  
  # Extended metadata fields to harvest when available
  extended_fields:
    # Publication venue information
    - journal
    - conference
    - publisher
    - volume
    - issue
    - pages
    
    # Language and location
    - language
    - country
    
    # Additional identifiers
    - pmid         # PubMed ID
    - arxiv_id     # arXiv identifier
    - issn         # Journal ISSN
    - isbn         # Book ISBN
    
    # Subject classification
    - subjects     # Subject headings/keywords
    - mesh_terms   # Medical Subject Headings
    
    # Full-text availability
    - pdf_url      # Direct PDF URL
    - fulltext_url # Full-text HTML URL
    - open_access  # Open access status
    
    # Citation information
    - cited_by_count
    - reference_count

# Search configuration
search:
  # Maximum results per source
  max_results_per_source: 25

  # Search mode presets for PRESS execution
  modes:
    quick: 10           # Fast reconnaissance scan
    standard: 25        # Balanced coverage
    comprehensive: 75   # Exhaustive sweep per source

  # Timeout settings (seconds)
  request_timeout: 30
  
  # Rate limiting
  rate_limit:
    requests_per_second: 5
    burst_size: 10

# Screening configuration  
screening:
  # AI-powered screening settings
  use_ai_screening: true
  
  # Inclusion criteria matching
  inclusion_threshold: 0.7  # Confidence threshold for inclusion
  
  # Custom screening prompts
  screening_prompt_template: |
    Based on the following research question and inclusion criteria, 
    determine if this paper should be included in the systematic review.
    
    Research Question: {query}
    
    Paper Title: {title}
    Abstract: {abstract}
    
    Include this paper? (yes/no) and provide reasoning.

# Appraisal configuration
appraisal:
  # Use AI for generating rationales
  use_ai_rationale: true
  
  # Quality assessment rubric file
  rubric_file: "rubric.yaml"
  
  # Minimum scores for quality levels
  quality_thresholds:
    red_max: 0.54
    amber_min: 0.55
    green_min: 0.75

# LLM (Language Model) Configuration
llm:
  # Model selection and fallbacks
  default_model: "gpt-4"           # Primary model for complex tasks
  fallback_model: "gpt-3.5-turbo" # Fallback when primary fails
  fast_model: "gpt-3.5-turbo"     # For simple classification tasks
  
  # Model-specific settings
  models:
    gpt-4:
      temperature: 0.3
      max_tokens: 2000
      max_retries: 3
      timeout: 60
      cost_per_1k_tokens:
        prompt: 0.03
        completion: 0.06
    
    gpt-4-turbo-preview:
      temperature: 0.3
      max_tokens: 4000
      max_retries: 3
      timeout: 120
      cost_per_1k_tokens:
        prompt: 0.01
        completion: 0.03
    
    gpt-3.5-turbo:
      temperature: 0.1
      max_tokens: 1000
      max_retries: 3
      timeout: 30
      cost_per_1k_tokens:
        prompt: 0.0015
        completion: 0.002
        
    gpt-3.5-turbo-16k:
      temperature: 0.1
      max_tokens: 4000
      max_retries: 3
      timeout: 60
      cost_per_1k_tokens:
        prompt: 0.003
        completion: 0.004
  
  # Rate limiting and performance
  rate_limits:
    requests_per_minute: 60
    tokens_per_minute: 100000
    concurrent_requests: 5
    
  # Retry and error handling
  retries:
    enabled: true
    max_attempts: 3
    backoff_factor: 2
    max_wait_time: 60
    retry_on_rate_limit: true
    
  # Observability and monitoring
  observability:
    enable_callbacks: true
    enable_langsmith: false      # Set to true and provide API key to enable
    langsmith_project: "ai-mvp-evidence-assistant"
    log_requests: true
    log_responses: false         # Set to true for debugging (may log sensitive data)
    track_token_usage: true
    cost_monitoring: true
    
  # Security and validation
  security:
    max_prompt_length: 10000
    allowed_domains: 
      - "*.openai.com"
      - "api.openai.com"
    sanitize_inputs: true
    prevent_prompt_injection: true
    
  # Environment-specific overrides
  environments:
    development:
      default_model: "gpt-3.5-turbo"
      enable_langsmith: true
      log_responses: true
      
    testing:
      mock_mode: true
      enable_callbacks: false
      
    production:
      default_model: "gpt-4"
      enable_langsmith: true
      log_responses: false
      cost_monitoring: true